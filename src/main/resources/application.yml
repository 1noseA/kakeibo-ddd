spring:
  application:
    name: kakeibo

  datasource:
    url: jdbc:h2:mem:kakeibo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080