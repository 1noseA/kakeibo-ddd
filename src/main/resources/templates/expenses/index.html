<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>支出登録</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<main class="container">
    <h1>支出登録</h1>

    <section class="card">
        <h2>支出を入力する</h2>

        <form th:action="@{/expenses}" th:object="${expenseForm}" method="post">

            <div class="error" th:if="${#fields.hasGlobalErrors()}">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="form-row">
                <label for="entryDate">支出日</label>
                <input id="entryDate" type="date" th:field="*{entryDate}">
                <div class="error" th:if="${#fields.hasErrors('entryDate')}" th:errors="*{entryDate}"></div>
            </div>

            <div class="form-row">
                <label for="amount">金額</label>
                <input id="amount" type="number" th:field="*{amount}" min="1">
                <div class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>

            <div class="form-row">
                <label for="categoryId">カテゴリー</label>
                <select id="categoryId" th:field="*{categoryId}">
                    <option value="">選択してください</option>
                    <option
                            th:each="category : ${categories}"
                            th:value="${category.id().value()}"
                            th:text="${category.name()}">
                    </option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
            </div>

            <div class="form-row">
                <label for="memo">メモ</label>
                <input id="memo" type="text" th:field="*{memo}" maxlength="255">
            </div>

            <div class="actions">
                <button type="submit">登録する</button>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>支出一覧</h2>

        <table>
            <thead>
            <tr>
                <th>日付</th>
                <th>金額</th>
                <th>カテゴリー</th>
                <th>メモ</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="expense : ${expenses}">
                <td th:text="${expense.entryDate()}"></td>
                <td class="amount" th:text="${#numbers.formatInteger(expense.amount(), 0, 'COMMA')} + '円'"></td>
                <td th:text="${expense.categoryName()}"></td>
                <td th:text="${expense.memo()}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(expenses)}">
                <td colspan="4" class="empty">まだ支出が登録されていません。</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

</body>
</html>
