<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>家計簿</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<main class="container">
    <header class="page-header">
        <div>
            <h1>家計簿</h1>
            <p class="summary" th:text="|支出 ${#lists.size(expenses)}件|">支出 0件</p>
        </div>
        <div class="header-actions">
            <button class="secondary-button" type="button" data-open-income-dialog>収入を登録</button>
            <button class="primary-button" type="button" data-open-expense-dialog>支出を登録</button>
        </div>
    </header>

    <nav class="month-navigation" aria-label="月の切り替え">
        <a class="secondary-button" th:href="@{/transactions(month=${previousMonth})}">前月</a>
        <span th:text="|${targetMonth.year}年${targetMonth.monthValue}月|">今月</span>
        <a class="secondary-button" th:href="@{/transactions(month=${nextMonth})}">次月</a>
    </nav>

    <section class="monthly-summary" aria-label="月次サマリー">
        <div class="summary-item income-summary">
            <div>
                <p class="panel-label">収入</p>
                <p class="summary-amount" th:if="${incomeTotal == 0}">未登録</p>
                <p
                        class="summary-amount"
                        th:unless="${incomeTotal == 0}"
                        th:text="${#numbers.formatInteger(incomeTotal, 0, 'COMMA')} + '円'">
                    0円
                </p>
            </div>
            <button
                    class="text-button"
                    type="button"
                    data-open-income-dialog
                    th:text="${incomeTotal == 0} ? '登録する' : '追加する'">
                登録する
            </button>
        </div>

        <div class="summary-item expense-summary">
            <div>
                <p class="panel-label">支出</p>
                <p
                        class="summary-amount"
                        th:text="${#numbers.formatInteger(expenseTotal ?: 0, 0, 'COMMA')} + '円'">
                    0円
                </p>
            </div>
            <button class="text-button" type="button" data-open-expense-dialog>追加する</button>
        </div>

        <div class="summary-item balance-summary">
            <div>
                <p class="panel-label">収支</p>
                <p
                        class="summary-amount"
                        th:text="${#numbers.formatInteger(balance ?: 0, 0, 'COMMA')} + '円'">
                    0円
                </p>
            </div>
            <p class="summary-note">収入 - 支出</p>
        </div>
    </section>

    <section class="list-panel" aria-label="支出一覧">
        <div class="section-header">
            <h2>支出一覧</h2>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>日付</th>
                    <th>カテゴリ</th>
                    <th>メモ</th>
                    <th class="amount">金額</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="expense : ${expenses}">
                    <td class="date" th:text="${expense.entryDate()}"></td>
                    <td th:text="${expense.categoryName()}"></td>
                    <td class="memo" th:text="${expense.memo()}"></td>
                    <td class="amount" th:text="${#numbers.formatInteger(expense.amount(), 0, 'COMMA')} + '円'"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(expenses)}">
                    <td colspan="4" class="empty">まだ支出が登録されていません。</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <dialog id="incomeDialog" class="entry-dialog" th:attr="open=${showIncomeDialog} ? 'open' : null">
        <form class="dialog-form" th:action="@{/transactions/incomes}" th:object="${incomeForm}" method="post">
            <div class="dialog-header">
                <h2>収入を登録</h2>
                <button class="icon-button" type="button" aria-label="閉じる" data-close-income-dialog>&times;</button>
            </div>

            <div class="error" th:if="${#fields.hasGlobalErrors()}">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="form-row">
                <label for="incomeEntryDate">日付</label>
                <input id="incomeEntryDate" type="date" th:field="*{entryDate}">
                <div class="error" th:if="${#fields.hasErrors('entryDate')}" th:errors="*{entryDate}"></div>
            </div>

            <div class="form-row">
                <label for="incomeAmount">金額</label>
                <input id="incomeAmount" type="number" th:field="*{amount}" min="1" inputmode="numeric" placeholder="例: 280000">
                <div class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>

            <div class="form-row">
                <label for="incomeCategoryId">カテゴリ</label>
                <select id="incomeCategoryId" th:field="*{categoryId}">
                    <option value="">選択してください</option>
                    <option
                            th:each="category : ${incomeCategories}"
                            th:value="${category.id().value()}"
                            th:text="${category.name()}">
                    </option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
            </div>

            <div class="form-row">
                <label for="incomeMemo">メモ</label>
                <input id="incomeMemo" type="text" th:field="*{memo}" maxlength="255" placeholder="例: 6月給与">
            </div>

            <div class="dialog-actions">
                <button class="secondary-button" type="button" data-close-income-dialog>キャンセル</button>
                <button class="primary-button" type="submit">保存</button>
            </div>
        </form>
    </dialog>

    <dialog id="expenseDialog" class="entry-dialog" th:attr="open=${showExpenseDialog} ? 'open' : null">
        <form class="dialog-form" th:action="@{/transactions/expenses}" th:object="${expenseForm}" method="post">
            <div class="dialog-header">
                <h2>支出を登録</h2>
                <button class="icon-button" type="button" aria-label="閉じる" data-close-expense-dialog>&times;</button>
            </div>

            <div class="error" th:if="${#fields.hasGlobalErrors()}">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="form-row">
                <label for="entryDate">日付</label>
                <input id="entryDate" type="date" th:field="*{entryDate}">
                <div class="error" th:if="${#fields.hasErrors('entryDate')}" th:errors="*{entryDate}"></div>
            </div>

            <div class="form-row">
                <label for="amount">金額</label>
                <input id="amount" type="number" th:field="*{amount}" min="1" inputmode="numeric">
                <div class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>

            <div class="form-row">
                <label for="categoryId">カテゴリ</label>
                <select id="categoryId" th:field="*{categoryId}">
                    <option value="">選択してください</option>
                    <option
                            th:each="category : ${expenseCategories}"
                            th:value="${category.id().value()}"
                            th:text="${category.name()}">
                    </option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
            </div>

            <div class="form-row">
                <label for="memo">メモ</label>
                <input id="memo" type="text" th:field="*{memo}" maxlength="255">
            </div>

            <div class="dialog-actions">
                <button class="secondary-button" type="button" data-close-expense-dialog>キャンセル</button>
                <button class="primary-button" type="submit">登録</button>
            </div>
        </form>
    </dialog>
</main>

<script>
    const setupDialog = (dialogId, openSelector, closeSelector) => {
        const dialog = document.getElementById(dialogId);
        const openButtons = document.querySelectorAll(openSelector);
        const closeButtons = document.querySelectorAll(closeSelector);

        openButtons.forEach((button) => {
            button.addEventListener('click', () => {
                if (dialog?.showModal) {
                    dialog.showModal();
                } else {
                    dialog?.setAttribute('open', 'open');
                }
            });
        });

        closeButtons.forEach((button) => {
            button.addEventListener('click', () => {
                dialog?.close?.();
                dialog?.removeAttribute('open');
            });
        });

        dialog?.addEventListener('click', (event) => {
            if (event.target === dialog) {
                dialog.close();
            }
        });
    };

    setupDialog('incomeDialog', '[data-open-income-dialog]', '[data-close-income-dialog]');
    setupDialog('expenseDialog', '[data-open-expense-dialog]', '[data-close-expense-dialog]');
</script>
</body>
</html>
